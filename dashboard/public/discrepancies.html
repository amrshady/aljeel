<head>

<style>
/* ── Accord Partners brand tokens ── */
:root{
  --navy:#1E40AF; --action:#2563EB; --action-hover:#1E40AF;
  --ink:#111827; --body:#374151; --muted:#6B7280; --subtle:#9CA3AF;
  --sage:#F0F4F3; --white:#FFFFFF; --border:#E5E7EB; --border-strong:#D1D5DB;
  --error:#DC2626; --error-bg:#FEF2F2; --error-tint:rgba(220,38,38,.1);
  --warn:#B8860B; --warn-bg:#FFFBEB; --warn-tint:rgba(184,134,11,.1);
  --info:#2563EB; --info-bg:#EFF6FF; --info-tint:rgba(37,99,235,.08);
  --success:#16A34A; --success-bg:#F0FDF4; --success-tint:rgba(22,163,74,.1);
  --shadow:0 1px 3px rgba(0,0,0,.10),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--sage);color:var(--ink);min-height:100vh;
  -webkit-font-smoothing:antialiased}

/* ── Header / Nav ── */
.nav{position:sticky;top:0;z-index:60;background:var(--navy);
  padding-top:env(safe-area-inset-top,0)}
.nav-inner{padding:14px 16px 0;display:flex;align-items:center;gap:10px}
.nav-logo{display:flex;align-items:center;gap:8px}
.nav-logo svg{flex:0 0 auto}
.nav-brand{font-size:13px;font-weight:300;color:rgba(255,255,255,.7);letter-spacing:.01em}
.nav-brand strong{font-weight:600;color:#fff}
.nav-title{margin-left:auto;font-size:13px;font-weight:500;
  color:rgba(255,255,255,.65);white-space:nowrap}

/* ── Score strip ── */
.score-strip{display:flex;gap:6px;padding:10px 16px 0;overflow-x:auto;
  scrollbar-width:none;-webkit-overflow-scrolling:touch}
.score-strip::-webkit-scrollbar{display:none}
.score-chip{flex:0 0 auto;padding:6px 14px;border-radius:20px;
  font-size:13px;font-weight:600;cursor:pointer;
  background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);
  border:1.5px solid transparent;transition:all .14s;white-space:nowrap}
.score-chip.active{background:rgba(255,255,255,.2);color:#fff;
  border-color:rgba(255,255,255,.5)}
.score-chip.perfect{background:rgba(22,163,74,.25);color:#86EFAC}
.score-chip.perfect.active{border-color:#86EFAC}

/* ── Tabs ── */
.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.15);
  padding:0 16px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:10px 12px;font-size:13px;font-weight:500;
  color:rgba(255,255,255,.55);cursor:pointer;
  border-bottom:2.5px solid transparent;transition:all .14s;white-space:nowrap}
.tab.active{color:#fff;border-bottom-color:#fff}

/* ── Panels ── */
.panels{padding-bottom:env(safe-area-inset-bottom,24px)}
.panel{display:none}.panel.active{display:block}

/* ── Batch summary ── */
.batch-summary{background:var(--white);border-bottom:1px solid var(--border);
  padding:16px;display:flex;align-items:center;gap:14px}
.batch-score{font-size:32px;font-weight:700;line-height:1}
.batch-score.perfect{color:var(--success)}
.batch-score.good{color:var(--action)}
.batch-score.warn{color:var(--warn)}
.batch-meta{flex:1}
.batch-meta h3{font-size:15px;font-weight:600;color:var(--ink)}
.batch-meta p{font-size:13px;color:var(--muted);margin-top:2px}
.batch-pills{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.mini-pill{font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;
  background:var(--info-bg);color:var(--action)}

/* ── Section label ── */
.section-label{padding:14px 16px 6px;font-size:11px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}

/* ── Issue cards ── */
.card{margin:6px 12px;border-radius:10px;background:var(--white);
  box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.card-head{display:flex;align-items:flex-start;gap:10px;padding:13px 14px;
  cursor:pointer;user-select:none;-webkit-user-select:none}
.card-head:active{background:var(--sage)}

/* Status badge — Accord spec: rounded pill, 12px, bg 15% */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;
  font-size:11px;font-weight:600;letter-spacing:.02em;white-space:nowrap;
  flex:0 0 auto;margin-top:1px}
.badge-error{background:var(--error-tint);color:var(--error)}
.badge-warning{background:var(--warn-tint);color:var(--warn)}
.badge-info{background:var(--info-tint);color:var(--info)}

.card-content{flex:1;min-width:0}
.card-pax{font-size:15px;font-weight:600;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}
.opex-ref{display:inline-block;margin-top:4px;font-size:11px;
  color:var(--action);font-weight:500}
.card-chevron{flex:0 0 auto;color:var(--muted);font-size:20px;
  transition:transform .18s;padding-top:1px;line-height:1}
.card.open .card-chevron{transform:rotate(180deg)}

/* Card body — field comparison */
.card-body{display:none;border-top:1px solid var(--border)}
.card.open .card-body{display:block}
.field-header{display:grid;grid-template-columns:30% 35% 35%;padding:8px 14px;
  background:var(--sage);border-bottom:1px solid var(--border)}
.field-header span{font-size:10px;font-weight:700;letter-spacing:.07em;
  text-transform:uppercase;color:var(--muted)}
.field-row{display:grid;grid-template-columns:30% 35% 35%;
  padding:9px 14px;border-bottom:1px solid var(--border)}
.field-row:last-child{border-bottom:none}
.field-name{font-size:12px;font-weight:600;color:var(--muted)}
.field-val{font-size:12px;color:var(--ink);padding-right:6px;word-break:break-word}
.field-val.ours{color:var(--error)}
.field-val.truth{color:var(--success)}

/* ── Perfect state ── */
.perfect-panel{margin:20px 12px;border-radius:12px;padding:28px 20px;
  background:var(--success-bg);border:1px solid rgba(22,163,74,.2);text-align:center}
.perfect-check{font-size:44px;line-height:1;margin-bottom:8px}
.perfect-panel h3{font-size:22px;font-weight:700;color:var(--success)}
.perfect-panel p{font-size:14px;color:var(--muted);margin-top:6px}

/* ── Footer ── */
.footer{text-align:center;padding:20px 16px;font-size:11px;color:var(--muted)}
</style>
</head>

function badgeClass(kind){
  return kind==='error'?'badge-error':kind==='warning'?'badge-warning':'badge-info';
}

function buildPanel(d){
  if(d.discrepancies.length===0){
    return `<div class="perfect-panel">
      <div class="perfect-check">✓</div>
      <h3>100% match</h3>
      <p>All ${d.rows} rows matched AlJeel exactly.<br>${d.period} 2026</p>
    </div>`;
  }
  const pctClass = d.pct>=95?'perfect':d.pct>=80?'good':'warn';
  let html = `<div class="batch-summary">
    <div class="batch-score ${pctClass}">${d.pct}%</div>
    <div class="batch-meta">
      <h3>${d.correct} of ${d.rows} rows exact · ${d.period}</h3>
      <p>${d.discrepancies.length} issues · ${d.rows-d.correct} rows with gaps</p>
      <div class="batch-pills">
        <span class="mini-pill">Account ${d.acct_pct}%</span>
        <span class="mini-pill">CC ${d.cc_pct}%</span>
      </div>
    </div>
  </div>
  <div class="section-label">${d.discrepancies.length} issues</div>`;

  d.discrepancies.forEach((row,i)=>{
    const id=`${d.id}_${i}`;
    const noteHtml = row.note ? `<span class="opex-ref">${row.note}</span>` : '';
    let fhHtml=`<div class="field-header">
      <span>Field</span><span>Ours</span><span>AlJeel</span>
    </div>`;
    let frHtml=row.fields.map(f=>`<div class="field-row">
      <span class="field-name">${f.field}</span>
      <span class="field-val ours">${f.ours}</span>
      <span class="field-val truth">${f.truth}</span>
    </div>`).join('');

    html+=`<div class="card" id="${id}">
      <div class="card-head" onclick="toggle('${id}')">
        <span class="badge ${badgeClass(row.kind)}">${row.tag}</span>
        <div class="card-content">
          <div class="card-pax">${row.pax}</div>
          <div class="card-sub">${row.ticket}${row.route?' · '+row.route:''}</div>
          ${noteHtml}
        </div>
        <span class="card-chevron">⌄</span>
      </div>
      <div class="card-body">${fhHtml}${frHtml}</div>
    </div>`;
  });
  return html+`<div class="footer">AlJeel AP · v25 · June 2026 · Accord Partners</div>`;
}

function toggle(id){document.getElementById(id).classList.toggle('open');}

function switchTab(idx){
  document.querySelectorAll('.score-chip').forEach((c,i)=>c.classList.toggle('active',i===idx));
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
  document.querySelectorAll('.score-chip')[idx].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

const strip=document.getElementById('scoreStrip');
const tabs=document.getElementById('tabs');
const panels=document.getElementById('panels');

DATA.forEach((d,i)=>{
  const pctClass = d.pct>=95?'perfect':'';
  const chip=document.createElement('div');
  chip.className=`score-chip ${pctClass}${i===0?' active':''}`;
  chip.textContent=`${d.batch}  ${d.pct}%`;
  chip.onclick=()=>switchTab(i);
  strip.appendChild(chip);

  const tab=document.createElement('div');
  tab.className=`tab${i===0?' active':''}`;
  tab.textContent=d.batch;
  tab.onclick=()=>switchTab(i);
  tabs.appendChild(tab);

  const panel=document.createElement('div');
  panel.className=`panel${i===0?' active':''}`;
  panel.id=`panel_${i}`;
  panel.innerHTML=buildPanel(d);
  panels.appendChild(panel);
});
